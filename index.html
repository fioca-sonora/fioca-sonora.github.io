<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e4d1c">
  <title>Fioca Sonora</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1e4d1c;
      background-image: url('backgroundpatt.png');
      background-repeat: repeat;
    }

    body {
      font-family: 'Georgia', serif;
      user-select: none;
    }

    /* ── Deck ── */
    #deck {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 155px;
      height: 258px;
      cursor: pointer;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #deck.empty {
      opacity: 0;
      pointer-events: none;
    }

    #restart {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.75);
      font-family: 'Shadows Into Light', cursive;
      font-size: 48px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease 0.4s, color 0.2s ease;
      z-index: 30;
      white-space: nowrap;
    }

    #restart.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #restart:hover {
      color: rgba(255,255,255,1);
    }

    .stack-card {
      position: absolute;
      width: 155px;
      height: 258px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 2px 3px 12px rgba(0,0,0,0.55);
      transition: transform 0.2s ease;
    }

    #deck:hover .stack-card:last-child {
      transform: translate(0px, -8px) rotate(0.5deg) !important;
    }

    /* ── Cards container ── */
    #cards-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    /* ── Dealt card ── */
    .playing-card {
      position: absolute;
      width: 160px;
      height: 267px;
      background: #f8f8f4;
      border-radius: 12px;
      box-shadow: 4px 6px 8px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      pointer-events: auto;
      text-decoration: none;
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.35s ease,
                  box-shadow 0.2s ease;
    }

    .playing-card:hover {
      box-shadow: 6px 10px 10px rgba(0,0,0,0.65);
    }

    .card-icon {
      width: 90px;
      height: 90px;
      object-fit: contain;
      flex-shrink: 0;
    }

    #email {
      position: fixed;
      bottom: 24px;
      right: 28px;
      color: rgba(255,255,255,0.6);
      font-family: 'Georgia', serif;
      font-size: 13px;
      text-decoration: none;
      z-index: 30;
      transition: color 0.2s ease;
    }

    #email:hover {
      color: rgba(255,255,255,1);
    }

    .playing-card span {
      font-family: 'Shadows Into Light', cursive;
      font-size: 28px;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      #deck {
        width: 75px;
        height: 125px;
      }
      .stack-card {
        width: 75px;
        height: 125px;
      }
      .playing-card {
        width: 90px;
        height: 150px;
        border-radius: 8px;
        gap: 7px;
      }
      .card-icon {
        width: 32px;
        height: 32px;
      }
      .playing-card span {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div id="deck"></div>
  <div id="cards-layer"></div>
  <button id="restart">↺</button>
  <a id="email" href="mailto:fiocasonora@gmail.com">fiocasonora@gmail.com</a>

  <script>
    // ── Card data — add or remove entries freely ──
    const CARDS = [
      { label: 'Instagram',  color: '#C13584', icon: 'instagram.png',   url: 'https://www.instagram.com/fiocasonora' },
      { label: 'Spotify',    color: '#1DB954', icon: 'spotify.png', url: 'https://open.spotify.com/intl-it/artist/5Rv1J1t1to6PuN14d2cWWN?si=74ZzIVocSXKPMxmpXXT5Cg&nd=1&dlsi=850a7cbba52f49e4' },
      { label: 'YouTube',    color: '#FF0000', icon: 'youtube.png',     url: 'https://www.youtube.com/watch?v=ugsi2dXWjVo' },
      { label: 'TikTok',     color: '#000000', icon: 'tiktok.png',      url: 'https://www.tiktok.com/@fiocasonora?is_from_webapp=1&sender_device=pc' },
      { label: 'Apple Music',color: '#FF4E6B', icon: 'apple-music.png', url: 'https://music.apple.com/gb/album/mi-hanno-detto-che-ho-urlato-il-tuo-nome-single/1762054215?app=music&at=11l65W&ct=push' },
      { label: 'SoundCloud', color: '#FF5500', icon: 'soundcloud.png',  url: 'https://soundcloud.com/fioca-sonora?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing' },
    ];

    // ── Fisher-Yates shuffle ──
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const deck  = document.getElementById('deck');
    const layer = document.getElementById('cards-layer');

    const isMobile = window.innerWidth <= 768;

    // ── Build deck stack images dynamically ──
    // Visual stack capped at 5 images regardless of card count
    // Generate stack offsets for any number of cards
    function makeStackOffsets(n) {
      const maxOff = isMobile ? 3 : 5;
      const maxRot = 2.5;
      return Array.from({ length: n }, (_, i) => {
        const t  = n === 1 ? 0.5 : i / (n - 1); // 0 → 1 bottom to top
        const tx = -maxOff + t * maxOff * 1.5;
        const ty = -maxOff + t * maxOff * 1.5;
        const rot = -maxRot + t * maxRot * 2;
        return [tx, ty, rot];
      });
    }
    const stackOffsets = makeStackOffsets(CARDS.length);
    for (let i = 0; i < CARDS.length; i++) {
      const img = document.createElement('img');
      img.className = 'stack-card';
      img.src = 'card.png';
      img.alt = '';
      const [tx, ty, rot] = stackOffsets[i];
      img.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
      deck.appendChild(img);
    }

    // ── Circular placement around the center deck ──
    // Each card gets its own angle slice; order is shuffled so draws feel random
    const angleOrder = shuffle([...Array(CARDS.length).keys()]);

    function circularPos(cardW, cardH, sliceIdx, total) {
      const vw  = window.innerWidth;
      const vh  = window.innerHeight;
      const pad = 16;
      const deckW = isMobile ? 75 : 155;
      const deckH = isMobile ? 125 : 258;
      const clearance = 24;

      // Forbidden zone for the card *center*: a rectangle equal to
      // (deck + card) half-dimensions plus clearance.
      const forbidW = (deckW + cardW) / 2 + clearance;
      const forbidH = (deckH + cardH) / 2 + clearance;

      const sliceAngle = (2 * Math.PI) / total;
      const angle = sliceAngle * sliceIdx + (Math.random() - 0.5) * sliceAngle * 0.6;

      const cosA = Math.abs(Math.cos(angle));
      const sinA = Math.abs(Math.sin(angle));
      const eps  = 0.001;

      // Minimum r so the card center exits the forbidden rectangle in this direction
      const minR = (cosA < eps) ? forbidH / sinA :
                   (sinA < eps) ? forbidW / cosA :
                   Math.min(forbidW / cosA, forbidH / sinA);

      // Maximum r so the card stays inside the viewport
      const maxRx = (cosA < eps) ? Infinity : (vw / 2 - cardW / 2 - pad) / cosA;
      const maxRy = (sinA < eps) ? Infinity : (vh / 2 - cardH / 2 - pad) / sinA;
      const maxR  = Math.min(maxRx, maxRy);

      const r = minR + Math.random() * Math.max(0, maxR - minR);
      const x = Math.max(pad, Math.min(vw - cardW - pad, vw / 2 + Math.cos(angle) * r - cardW / 2));
      const y = Math.max(pad, Math.min(vh - cardH - pad, vh / 2 + Math.sin(angle) * r - cardH / 2));
      return { x, y };
    }

    // ── Deck bounding box ──
    function deckCenter() {
      const r = deck.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }

    const shuffled = shuffle(CARDS);
    let nextIdx   = 0;
    let animating = false;

    const sfxFiles = ['sfx/sfx1.mp3', 'sfx/sfx2.mp3', 'sfx/sfx3.mp3', 'sfx/sfx4.mp3'];

    // ── Compute CSS filter to recolor a black icon to any hex color ──
    // brightness(0) makes all opaque pixels black (transparent stays transparent).
    // invert(50%) lifts them to mid-gray so sepia can add warmth/hue.
    // The remaining chain shifts hue, saturation, and lightness to the target.
    function hexToFilter(hex) {
      if (hex === '#000000') return 'brightness(0)';

      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
      const l=(max+min)/2;
      let h=0, s=0;
      if(d>0){
        s = l>0.5 ? d/(2-max-min) : d/(max+min);
        if(max===r)      h=((g-b)/d+(g<b?6:0))/6;
        else if(max===g) h=((b-r)/d+2)/6;
        else             h=((r-g)/d+4)/6;
      }
      // Reference point after brightness(0) invert(50%) sepia(100%): H≈38°, S≈24%, L≈57%
      const hueRot = Math.round(h*360 - 38);
      const sat    = Math.round(s*100 / 24 * 100);
      const bri    = Math.round(l*100 / 57 * 100);
      return `brightness(0) invert(50%) sepia(80%) hue-rotate(${hueRot}deg) saturate(${sat}%) brightness(${bri}%)`;
    }

    deck.addEventListener('click', handleDraw);
    document.getElementById('restart').addEventListener('click', () => location.reload());

    function handleDraw() {
      if (animating || nextIdx >= shuffled.length) return;
      animating = true;
      const sfx = new Audio(sfxFiles[Math.floor(Math.random() * sfxFiles.length)]);
      sfx.play();

      const data  = shuffled[nextIdx++];
      const cardW = isMobile ? 90 : 160;
      const cardH = isMobile ? 150 : 267;
      const pos   = circularPos(cardW, cardH, angleOrder[nextIdx - 1], CARDS.length);
      const angle = (Math.random() * 40 - 20).toFixed(1);

      // Create face-up card
      const card = document.createElement('a');
      card.className = 'playing-card';
      card.href   = data.url;
      card.target = '_blank';
      card.rel    = 'noopener noreferrer';
      card.style.left = pos.x + 'px';
      card.style.top  = pos.y + 'px';

      const iconImg = document.createElement('img');
      iconImg.className = 'card-icon';
      iconImg.src = `icons/${data.icon}`;
      iconImg.alt = data.label;
      card.appendChild(iconImg);

      const label = document.createElement('span');
      label.textContent = data.label;
      label.style.color = data.color;
      card.appendChild(label);

      // Start at deck position via translate offset
      const dc = deckCenter();
      const offsetX = dc.x - (pos.x + cardW / 2);
      const offsetY = dc.y - (pos.y + cardH / 2);
      card.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(0deg)`;
      card.style.opacity = '0';

      layer.appendChild(card);

      // Force reflow, then fly to final position
      card.getBoundingClientRect();
      card.style.transform = `rotate(${angle}deg)`;
      card.style.opacity = '1';

      // Sync stack images to remaining card count
      const remaining = shuffled.length - nextIdx;
      let stackCards = [...deck.querySelectorAll('.stack-card')];
      while (stackCards.length > remaining) {
        stackCards[stackCards.length - 1].remove();
        stackCards.pop();
      }
      if (nextIdx >= shuffled.length) {
        deck.classList.add('empty');
        document.getElementById('restart').classList.add('visible');
      }

      setTimeout(() => { animating = false; }, 600);
    }
  </script>
</body>
</html>
